# docker-compose.prod.yml
# EaaS - Email as a Service | Production Configuration
# Scaled for 100M emails: 3 API, 3 Worker, 2 Webhook, RabbitMQ cluster, Redis Sentinel, PgBouncer
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file docker-compose.prod.env up -d
#
# Architecture:
#   nginx (LB) --> api-1, api-2, api-3 --> pgbouncer --> postgres
#                                      --> redis-master (+ replica + sentinel)
#                                      --> rabbitmq cluster (3 nodes)
#   worker-1, worker-2, worker-3 (competing consumers)
#   webhook-processor-1, webhook-processor-2 (behind nginx for SNS)
#   prometheus + grafana (monitoring)

x-api-common: &api-common
  build:
    context: .
    dockerfile: src/EaaS.Api/Dockerfile
  restart: unless-stopped
  environment: &api-env
    ASPNETCORE_ENVIRONMENT: Production
    ASPNETCORE_URLS: http://+:8080
    # PgBouncer sits between app and PostgreSQL on port 6432
    ConnectionStrings__PostgreSQL: Host=pgbouncer;Port=6432;Database=eaas;Username=eaas_app;Password=${POSTGRES_PASSWORD};Pooling=false
    ConnectionStrings__Redis: redis-master:6379,password=${REDIS_PASSWORD}
    RabbitMq__Host: rabbitmq-1
    RabbitMq__Port: 5672
    RabbitMq__Username: ${RABBITMQ_USER}
    RabbitMq__Password: ${RABBITMQ_PASSWORD}
    RabbitMq__VirtualHost: eaas
    Ses__Region: ${AWS_REGION}
    Ses__AccessKeyId: ${AWS_ACCESS_KEY_ID}
    Ses__SecretAccessKey: ${AWS_SECRET_ACCESS_KEY}
  depends_on:
    pgbouncer:
      condition: service_healthy
    redis-master:
      condition: service_healthy
    rabbitmq-1:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 30s
  networks:
    - frontend
    - backend
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 512M
      reservations:
        cpus: "0.25"
        memory: 128M

x-worker-common: &worker-common
  build:
    context: .
    dockerfile: src/EaaS.Worker/Dockerfile
  restart: unless-stopped
  environment: &worker-env
    DOTNET_ENVIRONMENT: Production
    ConnectionStrings__PostgreSQL: Host=pgbouncer;Port=6432;Database=eaas;Username=eaas_app;Password=${POSTGRES_PASSWORD};Pooling=false
    ConnectionStrings__Redis: redis-master:6379,password=${REDIS_PASSWORD}
    RabbitMq__Host: rabbitmq-1
    RabbitMq__Port: 5672
    RabbitMq__Username: ${RABBITMQ_USER}
    RabbitMq__Password: ${RABBITMQ_PASSWORD}
    RabbitMq__VirtualHost: eaas
    Ses__Region: ${AWS_REGION}
    Ses__AccessKeyId: ${AWS_ACCESS_KEY_ID}
    Ses__SecretAccessKey: ${AWS_SECRET_ACCESS_KEY}
  depends_on:
    pgbouncer:
      condition: service_healthy
    redis-master:
      condition: service_healthy
    rabbitmq-1:
      condition: service_healthy
  # Worker health: check the process is alive (no HTTP endpoint)
  healthcheck:
    test: ["CMD-SHELL", "pgrep -f 'dotnet EaaS.Worker.dll' || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 30s
  networks:
    - backend
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 512M
      reservations:
        cpus: "0.25"
        memory: 128M

x-webhook-common: &webhook-common
  build:
    context: .
    dockerfile: src/EaaS.WebhookProcessor/Dockerfile
  restart: unless-stopped
  environment: &webhook-env
    ASPNETCORE_ENVIRONMENT: Production
    ASPNETCORE_URLS: http://+:8081
    ConnectionStrings__PostgreSQL: Host=pgbouncer;Port=6432;Database=eaas;Username=eaas_app;Password=${POSTGRES_PASSWORD};Pooling=false
    ConnectionStrings__Redis: redis-master:6379,password=${REDIS_PASSWORD}
    RabbitMq__Host: rabbitmq-1
    RabbitMq__Port: 5672
    RabbitMq__Username: ${RABBITMQ_USER}
    RabbitMq__Password: ${RABBITMQ_PASSWORD}
    RabbitMq__VirtualHost: eaas
    Tracking__BaseUrl: https://${DOMAIN}
  depends_on:
    pgbouncer:
      condition: service_healthy
    redis-master:
      condition: service_healthy
    rabbitmq-1:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 30s
  networks:
    - frontend
    - backend
  deploy:
    resources:
      limits:
        cpus: "0.5"
        memory: 256M
      reservations:
        cpus: "0.1"
        memory: 64M

x-rabbitmq-common: &rabbitmq-common
  image: rabbitmq:3.13-management-alpine
  restart: unless-stopped
  environment: &rabbitmq-env
    RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
    RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    RABBITMQ_DEFAULT_VHOST: eaas
    # Shared Erlang cookie for cluster formation
    RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
    RABBITMQ_USE_LONGNAME: "true"
  networks:
    - backend
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 1G
      reservations:
        cpus: "0.25"
        memory: 256M

services:
  # ============================================================
  # LOAD BALANCER
  # ============================================================

  nginx:
    image: nginx:1.25-alpine
    container_name: eaas-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      # SSL certificates -- replace with real paths or use certbot
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot:ro
    depends_on:
      - api-1
      - api-2
      - api-3
      - webhook-processor-1
      - webhook-processor-2
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ============================================================
  # API LAYER (3 instances behind nginx round-robin)
  # ============================================================

  api-1:
    <<: *api-common
    container_name: eaas-api-1
    hostname: api-1

  api-2:
    <<: *api-common
    container_name: eaas-api-2
    hostname: api-2

  api-3:
    <<: *api-common
    container_name: eaas-api-3
    hostname: api-3

  # ============================================================
  # WORKER LAYER (3 competing consumers on RabbitMQ queues)
  # ============================================================

  worker-1:
    <<: *worker-common
    container_name: eaas-worker-1
    hostname: worker-1

  worker-2:
    <<: *worker-common
    container_name: eaas-worker-2
    hostname: worker-2

  worker-3:
    <<: *worker-common
    container_name: eaas-worker-3
    hostname: worker-3

  # ============================================================
  # WEBHOOK PROCESSOR (2 instances behind nginx)
  # ============================================================

  webhook-processor-1:
    <<: *webhook-common
    container_name: eaas-webhook-processor-1
    hostname: webhook-processor-1

  webhook-processor-2:
    <<: *webhook-common
    container_name: eaas-webhook-processor-2
    hostname: webhook-processor-2

  # ============================================================
  # POSTGRESQL + PGBOUNCER
  # ============================================================

  postgres:
    image: postgres:16.2-alpine
    container_name: eaas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: eaas
      POSTGRES_USER: eaas_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgresql/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./scripts/migrate.sql:/docker-entrypoint-initdb.d/02-migrate.sql:ro
      - ./scripts/migrate_sprint2.sql:/docker-entrypoint-initdb.d/03-migrate-sprint2.sql:ro
      - ./scripts/migrate_sprint3.sql:/docker-entrypoint-initdb.d/04-migrate-sprint3.sql:ro
      - ./scripts/seed-data.sql:/docker-entrypoint-initdb.d/05-seed.sql:ro
    # Use custom config for production tuning
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eaas_app -d eaas"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 2G

  # PgBouncer: connection pooling between application and PostgreSQL
  # Transaction pooling mode -- each transaction gets a server connection, then returns it
  # This lets 200+ app connections share a smaller pool of actual Postgres connections
  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p2
    container_name: eaas-pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://eaas_app:${POSTGRES_PASSWORD}@postgres:5432/eaas
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 40
      MAX_CLIENT_CONN: 500
      MAX_DB_CONNECTIONS: 100
      RESERVE_POOL_SIZE: 10
      RESERVE_POOL_TIMEOUT: 3
      SERVER_IDLE_TIMEOUT: 600
      SERVER_LIFETIME: 3600
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      LOG_STATS: 1
      STATS_PERIOD: 60
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U eaas_app"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ============================================================
  # RABBITMQ CLUSTER (3 nodes with quorum queues)
  # ============================================================

  rabbitmq-1:
    <<: *rabbitmq-common
    container_name: eaas-rabbitmq-1
    hostname: rabbitmq-1
    environment:
      <<: *rabbitmq-env
      RABBITMQ_NODENAME: rabbit@rabbitmq-1
    volumes:
      - rabbitmq_1_data:/var/lib/rabbitmq
      - ./infrastructure/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infrastructure/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./infrastructure/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    ports:
      # Management UI only on node 1
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  rabbitmq-2:
    <<: *rabbitmq-common
    container_name: eaas-rabbitmq-2
    hostname: rabbitmq-2
    environment:
      <<: *rabbitmq-env
      RABBITMQ_NODENAME: rabbit@rabbitmq-2
    volumes:
      - rabbitmq_2_data:/var/lib/rabbitmq
      - ./infrastructure/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infrastructure/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    depends_on:
      rabbitmq-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  rabbitmq-3:
    <<: *rabbitmq-common
    container_name: eaas-rabbitmq-3
    hostname: rabbitmq-3
    environment:
      <<: *rabbitmq-env
      RABBITMQ_NODENAME: rabbit@rabbitmq-3
    volumes:
      - rabbitmq_3_data:/var/lib/rabbitmq
      - ./infrastructure/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infrastructure/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    depends_on:
      rabbitmq-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================================
  # REDIS SENTINEL (master + replica + 3 sentinels)
  # ============================================================

  redis-master:
    image: redis:7.2-alpine
    container_name: eaas-redis-master
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --tcp-backlog 511
      --hz 10
      --timeout 300
    volumes:
      - redis_master_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1280M
        reservations:
          cpus: "0.25"
          memory: 512M

  redis-replica-1:
    image: redis:7.2-alpine
    container_name: eaas-redis-replica-1
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --replicaof redis-master 6379
      --masterauth ${REDIS_PASSWORD}
    volumes:
      - redis_replica_data:/data
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1280M

  redis-sentinel-1:
    image: redis:7.2-alpine
    container_name: eaas-redis-sentinel-1
    restart: unless-stopped
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./infrastructure/redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  redis-sentinel-2:
    image: redis:7.2-alpine
    container_name: eaas-redis-sentinel-2
    restart: unless-stopped
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./infrastructure/redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  redis-sentinel-3:
    image: redis:7.2-alpine
    container_name: eaas-redis-sentinel-3
    restart: unless-stopped
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./infrastructure/redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  # ============================================================
  # MONITORING
  # ============================================================

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: eaas-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - backend
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  grafana:
    image: grafana/grafana:10.4.1
    container_name: eaas-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${DOMAIN}/grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ============================================================
  # TLS CERTIFICATE MANAGEMENT
  # ============================================================

  certbot:
    image: certbot/certbot:v2.9.0
    container_name: eaas-certbot
    volumes:
      - ./infrastructure/nginx/ssl:/etc/letsencrypt
      - certbot_data:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

# ============================================================
# VOLUMES
# ============================================================

volumes:
  postgres_data:
    driver: local
  redis_master_data:
    driver: local
  redis_replica_data:
    driver: local
  rabbitmq_1_data:
    driver: local
  rabbitmq_2_data:
    driver: local
  rabbitmq_3_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  certbot_data:
    driver: local

# ============================================================
# NETWORKS
# ============================================================

networks:
  # nginx + API + webhook processors (public-facing)
  frontend:
    driver: bridge
  # API + Worker + Webhook + databases (internal)
  backend:
    driver: bridge
  # Prometheus + Grafana (isolated monitoring)
  monitoring:
    driver: bridge
