worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ============================================================
    # HTTP → HTTPS redirect + ACME challenge
    # ============================================================
    server {
        listen 80;
        server_name sendnex.xyz www.sendnex.xyz;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================================
    # HTTPS — main server block
    # ============================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name sendnex.xyz www.sendnex.xyz;

        # SSL certificates (managed by certbot)
        ssl_certificate /etc/letsencrypt/live/sendnex.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sendnex.xyz/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # .NET API — keep full path
        location /api/v1/ {
            proxy_pass http://api:8080/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Backend health check
        location = /api/health-backend {
            proxy_pass http://api:8080/health;
            proxy_set_header Host $host;
        }

        # Webhook processor (SNS/payment callbacks)
        # Uses /hooks/ prefix to avoid conflict with dashboard /webhooks page
        location /hooks/ {
            proxy_pass http://webhook-processor:8081/webhooks/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Email open/click tracking
        location /track/ {
            proxy_pass http://webhook-processor:8081/track/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # pgAdmin
        location /pgadmin/ {
            proxy_pass http://pgadmin:5050/pgadmin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # Landing page — exact root only
        location = / {
            root /usr/share/nginx/landing;
            try_files /index.html =404;
        }

        # nginx health
        location = /nginx-health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Landing page static assets
        location /assets/ {
            root /usr/share/nginx/landing;
            try_files $uri =404;
        }

        # Everything else → redirect to Vercel-hosted dashboard
        # NOTE: $request_uri preserves the path AND query string, so tracking
        # links like /t/c/{token}?u=<encoded-url> forward intact to the app.
        # The H12 open-redirect defense lives inside the app's /track/click
        # handler (token validation + URL allow-list), not at this edge.
        location / {
            return 302 https://app.sendnex.xyz$request_uri;
        }
    }
}
