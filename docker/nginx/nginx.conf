worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ============================================================
    # HTTP — serves ACME challenge + redirects to HTTPS once cert exists
    # ============================================================
    server {
        listen 80;
        server_name sendnex.xyz www.sendnex.xyz _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # If SSL cert exists, redirect everything else to HTTPS.
        # If cert doesn't exist yet, fall through to serve HTTP.
        # Check handled by the ssl_certificate directive in the 443 block —
        # nginx won't start the 443 block without a cert, so HTTP keeps working.

        # .NET API — keep full path
        location /api/v1/ {
            proxy_pass http://api:8080/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Backend health check (legacy path)
        location = /api/health-backend {
            proxy_pass http://api:8080/health;
            proxy_set_header Host $host;
        }

        # Backend health check (used by dashboard proxy)
        location /health {
            proxy_pass http://api:8080/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Webhook processor (SNS/payment callbacks)
        # Uses /hooks/ prefix to avoid conflict with dashboard /webhooks page
        location /hooks/ {
            proxy_pass http://webhook-processor:8081/webhooks/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Email open/click tracking
        location /track/ {
            proxy_pass http://webhook-processor:8081/track/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # pgAdmin
        location /pgadmin/ {
            proxy_pass http://pgadmin:5050/pgadmin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # Landing page — exact root only
        location = / {
            # If SSL cert exists, redirect to HTTPS
            if (-f /etc/letsencrypt/live/sendnex.xyz/fullchain.pem) {
                return 301 https://$host$request_uri;
            }
            root /usr/share/nginx/landing;
            try_files /index.html =404;
        }

        # nginx health
        location = /nginx-health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Landing page static assets (CSS, JS, images if any)
        location /assets/ {
            root /usr/share/nginx/landing;
            try_files $uri =404;
        }

        # robots.txt + sitemap.xml served from landing root
        location = /robots.txt {
            root /usr/share/nginx/landing;
            try_files /robots.txt =404;
        }
        location = /sitemap.xml {
            root /usr/share/nginx/landing;
            try_files /sitemap.xml =404;
            add_header Content-Type application/xml;
        }

        # Everything else → redirect to HTTPS if cert exists, else Vercel
        # NOTE: $request_uri includes the full original URI — path AND query
        # string — so tracking links like /t/c/{token}?u=<encoded-url> are
        # forwarded to the app domain intact. This catch-all handles all
        # apex paths; tracking-specific click/open handling lives on the
        # app (via /track/click/{token}) and is NOT rewritten here, which
        # keeps the H12 open-redirect defense scoped to the app layer.
        location / {
            return 302 https://app.sendnex.xyz$request_uri;
        }
    }

    # ============================================================
    # HTTPS — only active once SSL cert exists
    # ============================================================
    server {
        listen 443 ssl http2;
        server_name sendnex.xyz www.sendnex.xyz;

        # Use real cert if it exists, otherwise use a self-signed/snakeoil placeholder
        # so nginx doesn't crash before certbot runs
        ssl_certificate /etc/letsencrypt/live/sendnex.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sendnex.xyz/privkey.pem;

        # Modern SSL config
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # CSP for the static landing. App (app.sendnex.xyz) sets its own CSP
        # via Next.js headers() so this scope is landing-only.
        # TODO: tighten by replacing 'unsafe-inline' with a nonce once inline
        # CSS is extracted.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        client_max_body_size 10m;

        # .NET API
        location /api/v1/ {
            proxy_pass http://api:8080/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60s;
        }

        # Backend health check
        location = /health {
            proxy_pass http://api:8080/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Webhook processor
        location /hooks/ {
            proxy_pass http://webhook-processor:8081/webhooks/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Email tracking
        location /track/ {
            proxy_pass http://webhook-processor:8081/track/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Landing page
        location = / {
            root /usr/share/nginx/landing;
            try_files /index.html =404;
        }

        location /assets/ {
            root /usr/share/nginx/landing;
            try_files $uri =404;
        }

        # robots.txt + sitemap.xml served from landing root
        location = /robots.txt {
            root /usr/share/nginx/landing;
            try_files /robots.txt =404;
        }
        location = /sitemap.xml {
            root /usr/share/nginx/landing;
            try_files /sitemap.xml =404;
            # Redeclare inherited server-level security headers because any
            # add_header inside a location block drops ALL inherited headers
            # in nginx. Keep this list in sync with the server block above.
            add_header Content-Type application/xml;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Frame-Options DENY always;
            add_header X-Content-Type-Options nosniff always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        }

        # Everything else → Vercel dashboard
        # NOTE: $request_uri preserves the full URI including the query
        # string, so tracking URLs (/t/c/{token}?u=<encoded-url>) reach the
        # app with all params intact. The H12 open-redirect defense is
        # enforced inside the app's /track/click handler, not at this edge.
        location / {
            return 302 https://app.sendnex.xyz$request_uri;
        }
    }

    # ============================================================
    # docs.sendnex.xyz — static documentation site
    # ============================================================
    # TODO (user action): add an A record for docs.sendnex.xyz -> 178.104.141.21
    # TODO (user action): issue SSL cert for docs.sendnex.xyz via certbot, e.g.
    #   docker compose run --rm certbot certonly --webroot \
    #     -w /var/www/certbot -d docs.sendnex.xyz \
    #     --email hello@sendnex.xyz --agree-tos --non-interactive
    # Once the cert exists, add a :443 server block mirroring the sendnex.xyz
    # one (same security headers) and switch this :80 block to redirect to
    # HTTPS. For now HTTP-only keeps the /docs redirect chain terminating at a
    # usable page.
    server {
        listen 80;
        server_name docs.sendnex.xyz;

        # Let's Encrypt ACME challenge — must stay on :80 even after SSL lands.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        root /usr/share/nginx/docs;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
