# Local development overrides
# Skips Nginx/TLS, exposes ports directly

services:
  api:
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  dashboard:
    ports:
      - "5001:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:5000

  webhook-processor:
    ports:
      - "5002:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  # Disable nginx and certbot for local dev
  nginx:
    profiles:
      - production

  certbot:
    profiles:
      - production
