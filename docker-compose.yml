# docker-compose.yml
# EaaS - Email as a Service
# All services on a single Hetzner CX22 VPS (2 vCPU, 4GB RAM, 40GB SSD)



services:
  # ============================================================
  # INFRASTRUCTURE
  # ============================================================

  postgres:
    image: postgres:16.2-alpine
    container_name: eaas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: eaas
      POSTGRES_USER: eaas_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./scripts/migrate.sql:/docker-entrypoint-initdb.d/02-migrate.sql:ro
      - ./scripts/migrate_sprint2.sql:/docker-entrypoint-initdb.d/03-migrate-sprint2.sql:ro
      - ./scripts/migrate_sprint3.sql:/docker-entrypoint-initdb.d/04-migrate-sprint3.sql:ro
      - ./scripts/migrate_sprint4.sql:/docker-entrypoint-initdb.d/04b-migrate-sprint4.sql:ro
      - ./scripts/migrate_sprint5.sql:/docker-entrypoint-initdb.d/04c-migrate-sprint5.sql:ro
      - ./scripts/migrate_template_versions.sql:/docker-entrypoint-initdb.d/04d-migrate-template-versions.sql:ro
      - ./scripts/migrate_sprint7.sql:/docker-entrypoint-initdb.d/04e-migrate-sprint7.sql:ro
      - ./scripts/migrate_sprint8_billing.sql:/docker-entrypoint-initdb.d/04f-migrate-sprint8-billing.sql:ro
      - ./scripts/migrate_scheduled_emails.sql:/docker-entrypoint-initdb.d/04g-migrate-scheduled-emails.sql:ro
      - ./scripts/migrate_review_gate.sql:/docker-entrypoint-initdb.d/04h-migrate-review-gate.sql:ro
      - ./scripts/seed-data.sql:/docker-entrypoint-initdb.d/05-seed.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eaas_app -d eaas"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7.2-alpine
    container_name: eaas-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: eaas-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: eaas_app
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: eaas
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================================
  # APPLICATION SERVICES
  # ============================================================

  api:
    build:
      context: .
      dockerfile: src/EaaS.Api/Dockerfile
    container_name: eaas-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=eaas;Username=eaas_app;Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD}
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=eaas_app
      - RabbitMq__Password=${RABBITMQ_PASSWORD}
      - RabbitMq__VirtualHost=eaas
      - Ses__Region=${AWS_REGION}
      - Ses__AccessKeyId=${AWS_ACCESS_KEY_ID}
      - Ses__SecretAccessKey=${AWS_SECRET_ACCESS_KEY}
      - AdminSession__SessionSecret=${SESSION_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  worker:
    build:
      context: .
      dockerfile: src/EaaS.Worker/Dockerfile
    container_name: eaas-worker
    restart: unless-stopped
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=eaas;Username=eaas_app;Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD}
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=eaas_app
      - RabbitMq__Password=${RABBITMQ_PASSWORD}
      - RabbitMq__VirtualHost=eaas
      - Ses__Region=${AWS_REGION}
      - Ses__AccessKeyId=${AWS_ACCESS_KEY_ID}
      - Ses__SecretAccessKey=${AWS_SECRET_ACCESS_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f EaaS.Worker || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  webhook-processor:
    build:
      context: .
      dockerfile: src/EaaS.WebhookProcessor/Dockerfile
    container_name: eaas-webhook-processor
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8081
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=eaas;Username=eaas_app;Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD}
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=eaas_app
      - RabbitMq__Password=${RABBITMQ_PASSWORD}
      - RabbitMq__VirtualHost=eaas
      - Tracking__BaseUrl=https://sendnex.xyz
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: eaas-dashboard
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - EAAS_API_INTERNAL_URL=http://api:8080
      - EAAS_API_KEY=${EAAS_API_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
      - SECURE_COOKIES=${SECURE_COOKIES:-false}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================================
  # MONITORING
  # ============================================================

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: eaas-prometheus
    restart: unless-stopped
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "127.0.0.1:9090:9090"
    profiles:
      - local

  loki:
    image: grafana/loki:3.1.0
    container_name: eaas-loki
    restart: unless-stopped
    volumes:
      - ./infrastructure/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "127.0.0.1:3100:3100"
    profiles:
      - local

  grafana:
    image: grafana/grafana:11.1.0
    container_name: eaas-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
      - loki
    profiles:
      - local

  # ============================================================
  # DATABASE ADMIN
  # ============================================================

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: eaas-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@sendnex.xyz}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 5050
      SCRIPT_NAME: /pgadmin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================================
  # LOCAL DEV TOOLS
  # ============================================================

  mailpit:
    image: axllent/mailpit:latest
    container_name: eaas-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"    # Web UI
      - "1025:1025"    # SMTP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    profiles:
      - local
    deploy:
      resources:
        limits:
          memory: 64M

  # ============================================================
  # REVERSE PROXY
  # ============================================================

  nginx:
    image: nginx:1.25-alpine
    container_name: eaas-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/letsencrypt:ro
      - certbot_data:/var/www/certbot:ro
      - ./landing:/usr/share/nginx/landing:ro
    depends_on:
      - api
      - webhook-processor
      - dashboard
    deploy:
      resources:
        limits:
          memory: 64M

  # ============================================================
  # TLS CERTIFICATE MANAGEMENT
  # ============================================================

  certbot:
    image: certbot/certbot:v2.9.0
    container_name: eaas-certbot
    volumes:
      - ./docker/nginx/ssl:/etc/letsencrypt
      - certbot_data:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  certbot_data:
  prometheus_data:
  loki_data:
  grafana_data:
  pgadmin_data:
