name: CI/CD

on:
  push:
    branches: [dev, prod]
  pull_request:
    branches: [dev, prod]

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (treat warnings as errors)
        run: dotnet build --no-restore --configuration Release /p:TreatWarningsAsErrors=true

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          SESSION_SECRET: ci-placeholder-secret-for-build-check-32chars
          EAAS_API_KEY: ci-placeholder-api-key
          EAAS_API_INTERNAL_URL: http://localhost:8080
          SECURE_COOKIES: "false"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: eaas_test
          POSTGRES_USER: eaas_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U eaas_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      rabbitmq:
        image: rabbitmq:3.13-management
        env:
          RABBITMQ_DEFAULT_USER: eaas_test
          RABBITMQ_DEFAULT_PASS: test_password
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd="rabbitmq-diagnostics -q ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      ConnectionStrings__PostgreSQL: "Host=localhost;Port=5432;Database=eaas_test;Username=eaas_test;Password=test_password"
      ConnectionStrings__Redis: "localhost:6379"
      ConnectionStrings__RabbitMQ: "amqp://eaas_test:test_password@localhost:5672"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests with coverage
        run: |
          dotnet test \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./test-results \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./test-results
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./test-results/**/coverage.cobertura.xml
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Check code formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build --no-cache

      - name: Start services
        run: |
          cp .env.example .env
          docker compose up -d || true
          # Give postgres time to finish init scripts before checking
          sleep 10
          if ! docker compose ps postgres | grep -q "running\|healthy"; then
            echo "=== Postgres container logs ==="
            docker compose logs postgres 2>&1 | tail -50
            echo "=== End postgres logs ==="
          fi
          # Ensure all services are started
          docker compose up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to start..."
          timeout=120
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            if docker compose ps | grep -qE "unhealthy| starting"; then
              sleep 5
              elapsed=$((elapsed + 5))
            else
              echo "All services are healthy."
              break
            fi
          done

          if [ $elapsed -ge $timeout ]; then
            echo "ERROR: Services did not become healthy within ${timeout}s"
            docker compose ps
            docker compose logs
            exit 1
          fi

      - name: Verify services are running
        run: |
          docker compose ps
          echo "---"
          echo "Checking running containers..."
          running=$(docker compose ps --status running -q | wc -l)
          echo "Running containers: $running"
          if [ "$running" -lt 1 ]; then
            echo "ERROR: No containers running"
            docker compose logs
            exit 1
          fi

      - name: Stop services
        if: always()
        run: docker compose down -v

  # ============================================================
  # DEPLOY — only on push to prod (production)
  # ============================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, test, docker]
    if: github.ref == 'refs/heads/prod' && github.event_name == 'push'
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/eaas
            git fetch origin prod
            git reset --hard origin/prod
            bash /opt/eaas/scripts/deploy.sh

  # ============================================================
  # SYNC MASTER — snapshot of prod after successful deploy
  # ============================================================
  sync-master:
    name: Sync master
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/prod' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fast-forward master to prod
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master
          git merge --ff-only origin/prod
          git push origin master
