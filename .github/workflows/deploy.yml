name: Deploy

on:
  push:
    branches:
      - "release/*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/eaas

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Extract version from branch name: release/v1.0.0 -> v1.0.0
            BRANCH="${GITHUB_REF#refs/heads/}"
            VERSION="${BRANCH#release/}"
            echo "tag=${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/EaaS.Api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-dashboard:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/EaaS.Worker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-worker:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Webhook Processor image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/EaaS.WebhookProcessor/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-webhook:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-webhook:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Hetzner VPS
        uses: appleboy/ssh-action@v1
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: VERSION,REGISTRY,IMAGE_PREFIX
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="/opt/eaas"
            BACKUP_TAG="rollback-$(date +%Y%m%d%H%M%S)"

            echo "=== Deploying EaaS ${VERSION} ==="

            cd "$APP_DIR"

            # Save current image tags for rollback
            docker compose ps -q | xargs -r docker inspect --format='{{.Config.Image}}' > /tmp/eaas-previous-images.txt || true

            # Log in to registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Update image tags in compose file
            export EAAS_VERSION="${VERSION}"

            # Pull new images
            echo "Pulling images for version ${VERSION}..."
            docker pull "${IMAGE_PREFIX}-api:${VERSION}"
            docker pull "${IMAGE_PREFIX}-dashboard:${VERSION}"
            docker pull "${IMAGE_PREFIX}-worker:${VERSION}"
            docker pull "${IMAGE_PREFIX}-webhook:${VERSION}"

            # Run database migrations
            echo "Running database migrations..."
            docker run --rm \
              --network eaas_default \
              --env-file "$APP_DIR/.env" \
              "${IMAGE_PREFIX}-api:${VERSION}" \
              dotnet ef database update

            # Recreate containers with new images (zero-downtime via rolling update)
            echo "Recreating containers..."
            docker compose up -d --no-deps --force-recreate api
            docker compose up -d --no-deps --force-recreate dashboard
            docker compose up -d --no-deps --force-recreate worker
            docker compose up -d --no-deps --force-recreate webhook-processor

            # Wait for containers to start
            sleep 10

            echo "Deployment of ${VERSION} complete."

      - name: Health check
        id: healthcheck
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: false
          script: |
            set -euo pipefail
            MAX_RETRIES=6
            RETRY_DELAY=10

            echo "Running health checks..."

            for i in $(seq 1 $MAX_RETRIES); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health || echo "000")

              if [ "$HTTP_CODE" = "200" ]; then
                echo "Health check PASSED (attempt $i)"
                exit 0
              fi

              echo "Health check attempt $i/$MAX_RETRIES: HTTP $HTTP_CODE"
              sleep $RETRY_DELAY
            done

            echo "Health check FAILED after $MAX_RETRIES attempts"
            exit 1

      - name: Rollback on failure
        if: failure() && steps.healthcheck.outcome == 'failure'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="/opt/eaas"

            echo "=== ROLLING BACK ==="

            cd "$APP_DIR"

            # Restore previous images
            if [ -f /tmp/eaas-previous-images.txt ]; then
              echo "Restoring previous container versions..."
              docker compose down
              # Pull previous images
              while IFS= read -r image; do
                docker pull "$image" 2>/dev/null || true
              done < /tmp/eaas-previous-images.txt
              docker compose up -d
            else
              echo "No rollback images found. Restarting current containers..."
              docker compose restart
            fi

            # Verify rollback health
            sleep 15
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Rollback successful. Services healthy."
            else
              echo "WARNING: Rollback completed but health check returned HTTP $HTTP_CODE"
              echo "Manual intervention may be required."
            fi

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ needs.build-and-push.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
