name: Deploy Webhook Processor Only (hotfix)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (lowercase, e.g., v20260414-sns-debug)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/israeliyonsi/eaas

jobs:
  build-and-push:
    name: Build & push webhook-processor image only
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ github.event.inputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/EaaS.WebhookProcessor/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-webhook:${{ github.event.inputs.version }}
            ${{ env.IMAGE_PREFIX }}-webhook:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Recreate webhook-processor on VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: appleboy/ssh-action@v1
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: VERSION,IMAGE_PREFIX
          script_stop: true
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd /opt/eaas
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            echo "=== pulling ${IMAGE_PREFIX}-webhook:${VERSION} ==="
            docker pull "${IMAGE_PREFIX}-webhook:${VERSION}"
            # Ensure Sns__DebugCanonical=true is set in /opt/eaas/.env for this diagnostic deploy
            if grep -q '^Sns__DebugCanonical=' .env; then
              sed -i 's/^Sns__DebugCanonical=.*/Sns__DebugCanonical=true/' .env
            else
              echo 'Sns__DebugCanonical=true' >> .env
            fi
            echo "=== .env Sns__ keys (redacted) ==="
            grep -E '^Sns__' .env | sed 's/=.*/=<redacted>/'
            # Tag the latest image as what compose expects (compose builds from context by default,
            # but we want to swap to the pulled image). Simplest: write docker-compose.override.yml
            # pointing webhook-processor to the pulled tag.
            cat > docker-compose.override.yml <<EOF
            services:
              webhook-processor:
                image: ${IMAGE_PREFIX}-webhook:${VERSION}
                build: !reset null
                environment:
                  - Sns__DebugCanonical=true
            EOF
            docker compose up -d --no-deps --force-recreate webhook-processor
            sleep 8
            docker ps --filter name=eaas-webhook-processor --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'
            echo "=== webhook-processor healthcheck ==="
            for i in 1 2 3 4 5 6; do
              HC=$(docker inspect --format='{{.State.Health.Status}}' eaas-webhook-processor 2>/dev/null || echo "unknown")
              echo "attempt $i: $HC"
              [ "$HC" = "healthy" ] && exit 0
              sleep 10
            done
            echo "WARN: healthcheck not healthy, continuing"
