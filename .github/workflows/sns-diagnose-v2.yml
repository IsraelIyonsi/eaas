name: SNS Diagnose v2 (manual)

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Prime+probe SES bounce, dump raw SNS logs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: SSH + dump raw diagnostic info
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 4m
          script: |
            set -e
            WINDOW_START=$(date -u +%s)
            echo "=== WINDOW_START_UTC=$(date -u -d @$WINDOW_START --iso-8601=seconds) ==="
            echo ""
            echo "=== webhook_delivery_logs BEFORE ==="
            PGPASS=$(grep ^POSTGRES_PASSWORD /opt/eaas/.env | cut -d= -f2-)
            docker exec -e PGPASSWORD="$PGPASS" eaas-postgres psql -U eaas_app -d eaas -tAc "SELECT COUNT(*) FROM webhook_delivery_logs;" || true
            echo ""
            AWS_KEY=$(grep ^AWS_ACCESS_KEY_ID /opt/eaas/.env | cut -d= -f2-)
            AWS_SECRET=$(grep ^AWS_SECRET_ACCESS_KEY /opt/eaas/.env | cut -d= -f2-)
            AWS_REG=$(grep ^AWS_REGION /opt/eaas/.env | cut -d= -f2-)
            echo "=== Trigger SES bounce simulator send #1 (prime) ==="
            timeout 30 docker run --rm \
              -e AWS_ACCESS_KEY_ID="$AWS_KEY" \
              -e AWS_SECRET_ACCESS_KEY="$AWS_SECRET" \
              -e AWS_DEFAULT_REGION="${AWS_REG:-eu-west-1}" \
              amazon/aws-cli ses send-email \
              --from noreply@sendnex.xyz \
              --to bounce@simulator.amazonses.com \
              --subject "sns-diagnose-v2-prime" \
              --text "prime" \
              --configuration-set-name sendnex-production 2>&1 | head -5 || true
            echo ""
            echo "=== Sleep 20s, then send #2 ==="
            sleep 20
            echo "=== Trigger SES bounce simulator send #2 (probe) ==="
            timeout 30 docker run --rm \
              -e AWS_ACCESS_KEY_ID="$AWS_KEY" \
              -e AWS_SECRET_ACCESS_KEY="$AWS_SECRET" \
              -e AWS_DEFAULT_REGION="${AWS_REG:-eu-west-1}" \
              amazon/aws-cli ses send-email \
              --from noreply@sendnex.xyz \
              --to bounce@simulator.amazonses.com \
              --subject "sns-diagnose-v2-probe" \
              --text "probe" \
              --configuration-set-name sendnex-production 2>&1 | head -5 || true
            echo ""
            echo "=== Sleep remaining 70s to reach 90s total window ==="
            sleep 70
            WINDOW_END=$(date -u +%s)
            WINDOW_SECS=$((WINDOW_END - WINDOW_START))
            echo "=== WINDOW_END_UTC=$(date -u -d @$WINDOW_END --iso-8601=seconds), elapsed=${WINDOW_SECS}s ==="
            echo ""
            echo "=== RAW webhook-processor log lines matching SNS|signature|Rejected|SubscribeUrl|Topic|MessageId|cert (case-insensitive) ==="
            docker logs --since ${WINDOW_SECS}s eaas-webhook-processor 2>&1 | grep -iE "(sns|signature|rejected|subscribeurl|topic|messageid|cert)" || echo "(no matching lines)"
            echo ""
            echo "=== webhook-processor FULL last 150 lines (raw) ==="
            docker logs --tail 150 eaas-webhook-processor 2>&1 || true
            echo ""
            echo "=== nginx access log POST /hooks/sns in window ==="
            docker logs --since ${WINDOW_SECS}s eaas-nginx 2>&1 | grep -iE "POST /hooks/sns" || echo "(no POST /hooks/sns entries)"
            echo ""
            echo "=== nginx error log tail ==="
            docker exec eaas-nginx sh -c 'tail -n 60 /var/log/nginx/error.log 2>/dev/null' || true
            echo ""
            echo "=== /opt/eaas/.env Sns__* keys (redacted) ==="
            grep -E "^Sns__" /opt/eaas/.env | sed "s/=.*/=<redacted>/" || echo "(no Sns__ keys in .env)"
            echo ""
            echo "=== webhook-processor container env Sns__* keys (redacted) ==="
            docker exec eaas-webhook-processor sh -c 'env | grep -iE "^Sns__" | sed "s/=.*/=<redacted>/"' || echo "(no Sns__ env in container)"
            echo ""
            echo "=== webhook_delivery_logs AFTER ==="
            docker exec -e PGPASSWORD="$PGPASS" eaas-postgres psql -U eaas_app -d eaas -tAc "SELECT COUNT(*) FROM webhook_delivery_logs;" || true
