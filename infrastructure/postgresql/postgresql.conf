# postgresql.conf -- Production-tuned PostgreSQL 16 for EaaS
# Optimized for a dedicated database server handling 100M email metadata
#
# Base assumption: 8GB RAM, SSD storage, high-write workload (email events)

# --------------------------------------------------------
# Connection settings
# PgBouncer sits in front, so actual Postgres connections stay low
# 200 max but PgBouncer limits to ~100 real connections
# --------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 3

# --------------------------------------------------------
# Memory
# shared_buffers: 25% of RAM (2GB of 8GB)
# effective_cache_size: 75% of RAM (OS cache + shared_buffers)
# work_mem: per-sort/hash operation memory (16MB x concurrent sorts)
# maintenance_work_mem: for VACUUM, CREATE INDEX (512MB for fast maintenance)
# --------------------------------------------------------
shared_buffers = 2GB
effective_cache_size = 6GB
work_mem = 16MB
maintenance_work_mem = 512MB
huge_pages = try

# --------------------------------------------------------
# WAL (Write-Ahead Log)
# wal_level=replica enables streaming replication if needed later
# Larger wal_buffers for high-write workload
# --------------------------------------------------------
wal_level = replica
max_wal_senders = 3
wal_buffers = 64MB
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min

# --------------------------------------------------------
# Query planner
# random_page_cost=1.1 for SSD (default 4.0 is for spinning disk)
# effective_io_concurrency=200 for SSD parallel I/O
# --------------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 200

# --------------------------------------------------------
# Parallel query execution
# Let Postgres use multiple cores for large queries
# --------------------------------------------------------
max_worker_processes = 8
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# --------------------------------------------------------
# Autovacuum tuning
# Email tables grow fast -- aggressive autovacuum prevents bloat
# Scale factor 0.02 = vacuum after 2% of rows change (default 20%)
# --------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.02
autovacuum_analyze_scale_factor = 0.01
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = 1000

# --------------------------------------------------------
# Logging
# Log queries slower than 100ms for performance analysis
# --------------------------------------------------------
log_destination = 'stderr'
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 100
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 250ms

# --------------------------------------------------------
# Statement statistics
# pg_stat_statements for query performance tracking
# --------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all

# --------------------------------------------------------
# Timezone
# --------------------------------------------------------
timezone = 'UTC'
