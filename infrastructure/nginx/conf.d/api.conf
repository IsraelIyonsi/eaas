# api.conf -- Server block for EaaS API, webhooks, and dashboard
# SSL termination with proxy to upstream backends

server {
    listen 443 ssl http2;
    server_name email.israeliyonsi.dev;

    # --------------------------------------------------------
    # SSL configuration
    # Replace with real certificate paths (certbot or custom)
    # --------------------------------------------------------
    ssl_certificate /etc/nginx/ssl/live/email.israeliyonsi.dev/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/email.israeliyonsi.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling for faster TLS handshakes
    ssl_stapling on;
    ssl_stapling_verify on;

    # --------------------------------------------------------
    # Request limits
    # 35MB to accommodate email attachments (SES limit is 10MB per message,
    # but base64 encoding inflates payload ~33%)
    # --------------------------------------------------------
    client_max_body_size 35m;
    client_body_buffer_size 128k;

    # --------------------------------------------------------
    # Proxy defaults
    # --------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header Connection "";

    # Timeouts for long-running requests
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # --------------------------------------------------------
    # API endpoints (rate limited)
    # --------------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://api_backend;

        # Buffering for better throughput
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }

    # --------------------------------------------------------
    # Health check (no rate limit, no logging)
    # Used by load balancers and monitoring
    # --------------------------------------------------------
    location /health {
        access_log off;
        proxy_pass http://api_backend;
    }

    # --------------------------------------------------------
    # SNS webhooks (AWS sends bounce/complaint/delivery notifications)
    # Lower rate limit since SNS traffic is controlled by AWS
    # --------------------------------------------------------
    location /webhooks/sns {
        limit_req zone=webhook_limit burst=20 nodelay;

        proxy_pass http://webhook_backend;

        # SNS sends JSON payloads, increase buffer for subscription confirmation
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }

    # --------------------------------------------------------
    # Tracking endpoints (open/click tracking pixels and links)
    # --------------------------------------------------------
    location /track/ {
        proxy_pass http://webhook_backend;

        # Tracking should be fast -- minimal buffering
        proxy_buffering off;
    }

    # --------------------------------------------------------
    # WebSocket support (future real-time features)
    # --------------------------------------------------------
    location /ws/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # --------------------------------------------------------
    # Dashboard (Next.js)
    # --------------------------------------------------------
    location / {
        proxy_pass http://api_backend;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --------------------------------------------------------
    # Deny access to hidden files
    # --------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
