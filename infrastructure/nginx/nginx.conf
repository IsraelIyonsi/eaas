# nginx.conf -- Production load balancer for EaaS
# Handles SSL termination, rate limiting, and load balancing across API/webhook instances

worker_processes auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # --------------------------------------------------------
    # Core settings
    # --------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --------------------------------------------------------
    # Logging
    # --------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr '
                    'response_time=$upstream_response_time '
                    'request_time=$request_time';

    access_log /var/log/nginx/access.log main buffer=16k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # --------------------------------------------------------
    # Gzip compression
    # --------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml
        text/javascript;

    # --------------------------------------------------------
    # Rate limiting zones
    # 100 req/s per IP for API, 10 req/s for webhooks (SNS is bursty but limited)
    # --------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=webhook_limit:5m rate=10r/s;
    limit_req_status 429;

    # --------------------------------------------------------
    # Upstream: 3 API instances (round-robin with health)
    # --------------------------------------------------------
    upstream api_backend {
        least_conn;
        server api-1:8080 max_fails=3 fail_timeout=30s;
        server api-2:8080 max_fails=3 fail_timeout=30s;
        server api-3:8080 max_fails=3 fail_timeout=30s;

        keepalive 32;
    }

    # --------------------------------------------------------
    # Upstream: 2 Webhook processor instances
    # --------------------------------------------------------
    upstream webhook_backend {
        least_conn;
        server webhook-processor-1:8081 max_fails=3 fail_timeout=30s;
        server webhook-processor-2:8081 max_fails=3 fail_timeout=30s;

        keepalive 16;
    }

    # --------------------------------------------------------
    # Security headers (applied globally)
    # --------------------------------------------------------
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'" always;

    # --------------------------------------------------------
    # Include server blocks
    # --------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;

    # --------------------------------------------------------
    # Internal health endpoint for nginx itself
    # --------------------------------------------------------
    server {
        listen 80 default_server;
        server_name _;

        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Everything else redirects to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }
}
