# sentinel.conf -- Redis Sentinel configuration for EaaS
# 3 sentinels monitoring redis-master with automatic failover

# --------------------------------------------------------
# Monitor the master node
# "eaas-master" is the logical name for this master group
# Quorum of 2 means 2 out of 3 sentinels must agree before failover
# --------------------------------------------------------
sentinel monitor eaas-master redis-master 6379 2

# --------------------------------------------------------
# Authentication
# --------------------------------------------------------
# This file is processed by envsubst at container startup. See docker-compose entrypoint.
sentinel auth-pass eaas-master REDIS_PASSWORD_PLACEHOLDER

# --------------------------------------------------------
# Failure detection
# Mark master as down after 5 seconds of no response
# --------------------------------------------------------
sentinel down-after-milliseconds eaas-master 5000

# --------------------------------------------------------
# Failover timeout
# Max time to complete a failover before retrying (10 seconds)
# --------------------------------------------------------
sentinel failover-timeout eaas-master 10000

# --------------------------------------------------------
# Parallel syncs
# How many replicas can sync with the new master simultaneously
# Keep at 1 to avoid all replicas being unavailable during failover
# --------------------------------------------------------
sentinel parallel-syncs eaas-master 1

# --------------------------------------------------------
# Sentinel port
# --------------------------------------------------------
port 26379

# --------------------------------------------------------
# Deny external script execution for security
# --------------------------------------------------------
sentinel deny-scripts-reconfig yes
