# rabbitmq.conf -- Production RabbitMQ configuration for EaaS
# 3-node cluster with quorum queues for durability at scale

# --------------------------------------------------------
# Cluster formation via DNS peer discovery
# Nodes: rabbitmq-1, rabbitmq-2, rabbitmq-3
# --------------------------------------------------------
cluster_formation.peer_discovery_backend = classic_config
cluster_formation.classic_config.nodes.1 = rabbit@rabbitmq-1
cluster_formation.classic_config.nodes.2 = rabbit@rabbitmq-2
cluster_formation.classic_config.nodes.3 = rabbit@rabbitmq-3

# Wait up to 30s for peers before starting as standalone
cluster_formation.node_cleanup.only_log_warning = true

# --------------------------------------------------------
# Quorum queue defaults
# Quorum queues use Raft consensus for replication -- data survives node loss
# --------------------------------------------------------
default_queue_type = quorum

# --------------------------------------------------------
# Memory management
# 1GB high watermark per node -- starts paging messages to disk beyond this
# --------------------------------------------------------
vm_memory_high_watermark.absolute = 1GB
vm_memory_high_watermark_paging_ratio = 0.75

# --------------------------------------------------------
# Disk free limit
# Alarms trigger at 500MB free -- prevents filling disk completely
# --------------------------------------------------------
disk_free_limit.absolute = 500MB

# --------------------------------------------------------
# Connection and channel limits
# --------------------------------------------------------
channel_max = 128
heartbeat = 60

# --------------------------------------------------------
# Management plugin (UI + HTTP API)
# --------------------------------------------------------
management.listener.port = 15672
management.listener.ssl = false

# Publish rates sampling (for management UI graphs)
management.rates_mode = basic

# --------------------------------------------------------
# Logging
# --------------------------------------------------------
log.console = true
log.console.level = warning
log.file = false

# --------------------------------------------------------
# Load definitions on startup (exchanges, queues, bindings)
# Only applied on rabbitmq-1 (first boot)
# --------------------------------------------------------
management.load_definitions = /etc/rabbitmq/definitions.json

# --------------------------------------------------------
# Prometheus metrics endpoint
# --------------------------------------------------------
prometheus.return_per_object_metrics = true
