# TEMPLATE ONLY - Do NOT commit real secrets to version control
# In production, use one of:
#   - External Secrets Operator (syncs from AWS Secrets Manager / Vault)
#   - Sealed Secrets (encrypted at rest in git)
#   - SOPS with age/KMS encryption
#
# To use this template:
#   1. Copy to secrets-local.yaml
#   2. Replace <PLACEHOLDER> values with real credentials
#   3. Apply: kubectl apply -f secrets-local.yaml
#   4. Delete the local file
apiVersion: v1
kind: Secret
metadata:
  name: eaas-secrets
  namespace: eaas
  labels:
    app.kubernetes.io/name: eaas-secrets
    app.kubernetes.io/part-of: eaas
type: Opaque
stringData:
  # PostgreSQL
  Database__Password: "<POSTGRES_PASSWORD>"

  # Redis
  Redis__Password: "<REDIS_PASSWORD>"

  # RabbitMQ
  RabbitMQ__Password: "<RABBITMQ_PASSWORD>"

  # AWS credentials for SES and S3
  # Prefer IRSA (IAM Roles for Service Accounts) over static keys
  Aws__AccessKeyId: "<AWS_ACCESS_KEY_ID>"
  Aws__SecretAccessKey: "<AWS_SECRET_ACCESS_KEY>"

  # API signing key for HMAC signature verification on API keys
  Security__ApiSigningKey: "<API_SIGNING_KEY_MIN_32_CHARS>"

  # Erlang cookie for RabbitMQ cluster
  RabbitMQ__ErlangCookie: "<ERLANG_COOKIE>"

  # Grafana admin password
  grafana-admin-password: "<GRAFANA_ADMIN_PASSWORD>"
