# PgBouncer configuration
# Transaction pooling: connections are returned to the pool after each transaction
# This is critical for .NET apps that hold connections across async operations
apiVersion: v1
kind: ConfigMap
metadata:
  name: eaas-pgbouncer-config
  namespace: eaas
  labels:
    app.kubernetes.io/name: eaas-pgbouncer
    app.kubernetes.io/component: connection-pooler
    app.kubernetes.io/part-of: eaas
data:
  pgbouncer.ini: |
    [databases]
    eaas = host=eaas-postgres-headless port=5432 dbname=eaas

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    auth_type = scram-sha-256
    auth_file = /etc/pgbouncer/userlist.txt

    ; Transaction pooling - best fit for web/API workloads
    ; Server connections returned after each transaction completes
    pool_mode = transaction

    ; Pool sizing for 100M emails / 100 customers
    ; Each app pod uses ~5-10 connections; with 20+ pods that's 100-200 client connections
    max_client_conn = 500
    default_pool_size = 50
    min_pool_size = 10
    reserve_pool_size = 10
    reserve_pool_timeout = 3

    ; Timeouts
    server_connect_timeout = 5
    server_login_retry = 3
    query_timeout = 60
    query_wait_timeout = 30
    client_idle_timeout = 300

    ; Logging
    log_connections = 1
    log_disconnections = 1
    log_pooler_errors = 1
    stats_period = 60

    ; Security
    server_tls_sslmode = prefer
