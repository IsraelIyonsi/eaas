# PgBouncer - Connection pooler in front of PostgreSQL
# 2 replicas for HA. Transaction pooling mode lets us multiplex
# hundreds of application connections onto ~50 real PG connections.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eaas-pgbouncer
  namespace: eaas
  labels:
    app.kubernetes.io/name: eaas-pgbouncer
    app.kubernetes.io/component: connection-pooler
    app.kubernetes.io/part-of: eaas
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: eaas-pgbouncer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eaas-pgbouncer
        app.kubernetes.io/component: connection-pooler
        app.kubernetes.io/part-of: eaas
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pgbouncer
          image: bitnami/pgbouncer:1.22.0
          ports:
            - name: pgbouncer
              containerPort: 6432
              protocol: TCP
          env:
            - name: PGBOUNCER_DATABASE
              value: "eaas"
            - name: POSTGRESQL_HOST
              value: "eaas-postgres-headless"
            - name: POSTGRESQL_PORT
              value: "5432"
            - name: POSTGRESQL_USERNAME
              value: "eaas_app"
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eaas-secrets
                  key: Database__Password
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /bitnami/pgbouncer/conf/pgbouncer.ini
              subPath: pgbouncer.ini
      volumes:
        - name: config
          configMap:
            name: eaas-pgbouncer-config
