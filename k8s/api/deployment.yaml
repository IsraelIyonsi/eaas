# EaaS API Deployment
# Handles all inbound HTTP requests (REST API, webhook registration, key management)
# Scales 3-10 pods based on CPU/memory pressure via HPA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eaas-api
  namespace: eaas
  labels:
    app.kubernetes.io/name: eaas-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: eaas
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Zero-downtime deployment: never take down existing pods before new ones are ready
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: eaas-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eaas-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: eaas
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: eaas-api
      automountServiceAccountToken: false
      # Spread pods across nodes so a single node failure doesn't take out all replicas
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: eaas-api
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: eaas/api:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: eaas-config
            - secretRef:
                name: eaas-secrets
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1"
          # Liveness: restart pod if it becomes unresponsive
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Readiness: remove from service if not ready to accept traffic
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          # Startup: give the app time to start before liveness kicks in
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        # .NET needs /tmp for temp files; read-only root filesystem requires an emptyDir mount
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
      terminationGracePeriodSeconds: 30
