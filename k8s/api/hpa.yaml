# HPA for EaaS API
# Scales based on CPU (primary) and memory (secondary)
# Conservative scale-down to avoid flapping under bursty email traffic
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: eaas-api
  namespace: eaas
  labels:
    app.kubernetes.io/name: eaas-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: eaas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: eaas-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      # 5-minute stabilization prevents premature scale-down after traffic spikes
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
