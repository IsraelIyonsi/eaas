# Dev overlay: minimal resources for local development
# Single replica per service, smaller resource requests, no HPA
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: eaas

resources:
  - ../../

commonLabels:
  environment: dev

patches:
  # API: 1 replica, reduced resources
  - target:
      kind: Deployment
      name: eaas-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"

  # Worker: 1 replica, reduced resources
  - target:
      kind: Deployment
      name: eaas-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"

  # WebhookProcessor: 1 replica, reduced resources
  - target:
      kind: Deployment
      name: eaas-webhook-processor
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "64Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "50m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "250m"

  # PgBouncer: 1 replica
  - target:
      kind: Deployment
      name: eaas-pgbouncer
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # PostgreSQL: smaller storage
  - target:
      kind: StatefulSet
      name: eaas-postgres
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: "5Gi"
      - op: remove
        path: /spec/volumeClaimTemplates/0/spec/storageClassName

  # RabbitMQ: 1 replica for dev
  - target:
      kind: StatefulSet
      name: eaas-rabbitmq
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "250m"
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: "2Gi"
      - op: remove
        path: /spec/volumeClaimTemplates/0/spec/storageClassName

  # Redis: 1 replica for dev
  - target:
      kind: StatefulSet
      name: eaas-redis
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: "1Gi"
      - op: remove
        path: /spec/volumeClaimTemplates/0/spec/storageClassName

  # Disable HPA in dev
  - target:
      kind: HorizontalPodAutoscaler
      name: eaas-api
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 1

  - target:
      kind: HorizontalPodAutoscaler
      name: eaas-worker
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 1

  - target:
      kind: HorizontalPodAutoscaler
      name: eaas-webhook-processor
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 1

  # Dev logging level
  - target:
      kind: ConfigMap
      name: eaas-config
    patch: |
      - op: replace
        path: /data/Logging__LogLevel__Default
        value: "Debug"
