# Redis with Sentinel for HA
# 1 master + 2 replicas, Sentinel handles automatic failover
# Used for: rate limiting counters, API key caching, idempotency keys, distributed locks
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: eaas-redis
  namespace: eaas
  labels:
    app.kubernetes.io/name: eaas-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: eaas
spec:
  serviceName: eaas-redis-headless
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: eaas-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eaas-redis
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: eaas
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: eaas-redis
                topologyKey: kubernetes.io/hostname
      initContainers:
        # Render redis.conf by substituting ${REDIS_PASSWORD} into the
        # template from the ConfigMap, then pick master vs replica based on
        # the pod's ordinal index. The rendered file is written to an
        # emptyDir (/rendered) so the main container (readOnlyRootFilesystem)
        # can still read it without mutating the persistent data volume.
        - name: init-redis
          image: redis:7-alpine
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eaas-secrets
                  key: Redis__Password
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              ORDINAL=$(echo "$HOSTNAME" | rev | cut -d'-' -f1 | rev)
              if [ "$ORDINAL" = "0" ]; then
                SRC=/config-source/redis-master.conf
              else
                SRC=/config-source/redis-replica.conf
              fi
              # Substitute ${REDIS_PASSWORD} using awk (envsubst is not in
              # redis:7-alpine). Passing the password as an awk -v variable
              # keeps it out of the awk program source, and the output file
              # is chmod 0400 so only the redis user (uid 999) can read it.
              awk -v pw="$REDIS_PASSWORD" '{ gsub(/\$\{REDIS_PASSWORD\}/, pw); print }' \
                "$SRC" > /rendered/redis.conf
              chmod 0400 /rendered/redis.conf
          volumeMounts:
            - name: rendered-config
              mountPath: /rendered
            - name: config
              mountPath: /config-source
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          command:
            - redis-server
            - /rendered/redis.conf
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eaas-secrets
                  key: Redis__Password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - redis-cli --no-auth-warning -a $REDIS_PASSWORD ping
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - redis-cli --no-auth-warning -a $REDIS_PASSWORD ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
            - name: rendered-config
              mountPath: /rendered
              readOnly: true
        # Sentinel sidecar for automatic failover
        - name: sentinel
          image: redis:7-alpine
          ports:
            - name: sentinel
              containerPort: 26379
              protocol: TCP
          command:
            - redis-sentinel
            - /config/sentinel.conf
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: sentinel-config
              mountPath: /config
      volumes:
        - name: config
          configMap:
            name: eaas-redis-config
        - name: sentinel-config
          configMap:
            name: eaas-redis-sentinel-config
        # Holds the redis.conf rendered by the init container with
        # ${REDIS_PASSWORD} substituted in. Not persisted — re-rendered on
        # every pod start, which is correct: the secret is the source of truth.
        - name: rendered-config
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: eaas-redis
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ssd
        resources:
          requests:
            storage: 10Gi
