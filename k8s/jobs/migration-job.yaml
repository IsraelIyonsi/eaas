# Database migration job
# Runs EF Core migrations or SQL scripts before application deployment
# Use ArgoCD sync waves (wave -1) or Helm pre-install/pre-upgrade hooks
# to ensure migrations complete before pods start
apiVersion: batch/v1
kind: Job
metadata:
  name: eaas-db-migration
  namespace: eaas
  labels:
    app.kubernetes.io/name: eaas-migration
    app.kubernetes.io/component: migration
    app.kubernetes.io/part-of: eaas
  annotations:
    # ArgoCD: run before other resources
    argocd.argoproj.io/sync-wave: "-1"
    # Helm: run as pre-install/pre-upgrade hook
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eaas-migration
        app.kubernetes.io/component: migration
        app.kubernetes.io/part-of: eaas
    spec:
      restartPolicy: OnFailure
      serviceAccountName: eaas-migration
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: eaas/migration:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Running EaaS database migrations..."
              dotnet ef database update --project /app/EaaS.Infrastructure --startup-project /app/EaaS.Api
              echo "Migrations completed successfully."
          envFrom:
            - configMapRef:
                name: eaas-config
            - secretRef:
                name: eaas-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 50Mi
