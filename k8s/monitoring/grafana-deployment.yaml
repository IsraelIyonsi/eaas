# Grafana deployment for EaaS monitoring dashboards
# Pre-configured with Prometheus data source and EaaS dashboards
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eaas-grafana
  namespace: eaas
  labels:
    app.kubernetes.io/name: eaas-grafana
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: eaas
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eaas-grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eaas-grafana
        app.kubernetes.io/component: monitoring
        app.kubernetes.io/part-of: eaas
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: grafana/grafana:10.4-alpine
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eaas-secrets
                  key: grafana-admin-password
            - name: GF_INSTALL_PLUGINS
              value: "grafana-clock-panel"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: storage
              mountPath: /var/lib/grafana
      volumes:
        - name: datasources
          configMap:
            name: eaas-grafana-datasources
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: eaas-grafana
  namespace: eaas
  labels:
    app.kubernetes.io/name: eaas-grafana
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: eaas
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
  selector:
    app.kubernetes.io/name: eaas-grafana
---
# Pre-configure Prometheus as the default data source
apiVersion: v1
kind: ConfigMap
metadata:
  name: eaas-grafana-datasources
  namespace: eaas
  labels:
    app.kubernetes.io/name: eaas-grafana
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: eaas
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring:9090
        isDefault: true
        editable: false
