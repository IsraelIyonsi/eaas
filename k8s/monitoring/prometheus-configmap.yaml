# Prometheus scrape configuration for EaaS services
# Uses K8s service discovery to automatically find annotated pods
apiVersion: v1
kind: ConfigMap
metadata:
  name: eaas-prometheus-config
  namespace: eaas
  labels:
    app.kubernetes.io/name: eaas-prometheus
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: eaas
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      scrape_timeout: 10s

    scrape_configs:
      # Auto-discover pods with prometheus.io/scrape=true annotation
      - job_name: 'eaas-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - eaas
        relabel_configs:
          # Only scrape pods with the annotation
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          # Use the port from annotation
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: ${1}
          - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+);(.+)
            replacement: $1:$2
          # Use the path from annotation
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Add pod labels
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: replace
            target_label: app
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            action: replace
            target_label: component
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod

      # RabbitMQ metrics (management plugin exposes Prometheus endpoint)
      - job_name: 'rabbitmq'
        static_configs:
          - targets:
              - eaas-rabbitmq:15692
        metrics_path: /metrics

      # PgBouncer metrics (if exporter sidecar is added)
      - job_name: 'pgbouncer'
        static_configs:
          - targets:
              - eaas-pgbouncer:9127
        metrics_path: /metrics
