# PostgreSQL 16 StatefulSet
# Single-node for K8s-managed deployments. In real production, use a managed
# service (RDS, CloudNativePG operator, or Patroni for HA).
# PgBouncer sits in front to handle connection pooling.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: eaas-postgres
  namespace: eaas
  labels:
    app.kubernetes.io/name: eaas-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: eaas
spec:
  serviceName: eaas-postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eaas-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eaas-postgres
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: eaas
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: "eaas"
            - name: POSTGRES_USER
              value: "eaas_app"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eaas-secrets
                  key: Database__Password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "2"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - eaas_app
                - -d
                - eaas
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - eaas_app
                - -d
                - eaas
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
            - name: config
              mountPath: /etc/postgresql/pg_hba.conf
              subPath: pg_hba.conf
          args:
            - -c
            - config_file=/etc/postgresql/postgresql.conf
            - -c
            - hba_file=/etc/postgresql/pg_hba.conf
      volumes:
        - name: config
          configMap:
            name: eaas-postgres-config
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: eaas-postgres
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ssd
        resources:
          requests:
            storage: 100Gi
