# PostgreSQL production tuning for EaaS workload
# Tuned for: high write throughput (email events), partitioned tables, connection pooling via PgBouncer
apiVersion: v1
kind: ConfigMap
metadata:
  name: eaas-postgres-config
  namespace: eaas
  labels:
    app.kubernetes.io/name: eaas-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: eaas
data:
  postgresql.conf: |
    # Connection settings - PgBouncer handles pooling, so we allow generous direct connections
    listen_addresses = '*'
    max_connections = 200
    superuser_reserved_connections = 3

    # Memory - tuned for 2-4Gi container
    shared_buffers = 512MB
    effective_cache_size = 1536MB
    work_mem = 8MB
    maintenance_work_mem = 128MB

    # WAL settings - optimized for write-heavy email event logging
    wal_level = replica
    max_wal_size = 2GB
    min_wal_size = 512MB
    wal_buffers = 64MB
    checkpoint_completion_target = 0.9
    checkpoint_timeout = 10min

    # Query planner
    random_page_cost = 1.1
    effective_io_concurrency = 200
    default_statistics_target = 100

    # Parallel query - helps with analytics on partitioned email_events table
    max_parallel_workers_per_gather = 2
    max_parallel_workers = 4
    max_parallel_maintenance_workers = 2

    # Partitioning - enable partition pruning for the time-partitioned tables
    enable_partition_pruning = on

    # Logging
    log_min_duration_statement = 500
    log_checkpoints = on
    log_connections = on
    log_disconnections = on
    log_lock_waits = on
    log_temp_files = 0
    log_autovacuum_min_duration = 0

    # Autovacuum - aggressive for high-churn email tables
    autovacuum_max_workers = 4
    autovacuum_naptime = 30s
    autovacuum_vacuum_threshold = 50
    autovacuum_analyze_threshold = 50
    autovacuum_vacuum_scale_factor = 0.05
    autovacuum_analyze_scale_factor = 0.025

    # Timezone
    timezone = 'UTC'
    log_timezone = 'UTC'

  pg_hba.conf: |
    # TYPE  DATABASE  USER       ADDRESS          METHOD
    # Local connections
    local   all       all                         trust
    # PgBouncer connections (within cluster)
    host    all       all        10.0.0.0/8       scram-sha-256
    host    all       all        172.16.0.0/12    scram-sha-256
    # Deny everything else
    host    all       all        0.0.0.0/0        reject
