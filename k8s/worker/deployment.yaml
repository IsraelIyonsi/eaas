# EaaS Worker Deployment
# Processes email sending jobs from RabbitMQ queues
# No HTTP port - uses exec probe to verify the worker process is alive
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eaas-worker
  namespace: eaas
  labels:
    app.kubernetes.io/name: eaas-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: eaas
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: eaas-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eaas-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: eaas
      annotations: {}
    spec:
      serviceAccountName: eaas-worker
      automountServiceAccountToken: false
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: eaas-worker
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: eaas/worker:latest
          envFrom:
            - configMapRef:
                name: eaas-config
            - secretRef:
                name: eaas-secrets
          env:
            - name: DOTNET_ENVIRONMENT
              value: "Production"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1"
          # No HTTP port so we check if the dotnet process is running
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pgrep -f 'dotnet.*Worker' || exit 1"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
      # Workers need time to finish processing current messages before shutdown
      terminationGracePeriodSeconds: 60
