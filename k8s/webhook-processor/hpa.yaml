# HPA for Webhook Processor
# Webhook traffic is bursty (SES sends batches of notifications)
# but individual payloads are small - CPU is the right scaling signal
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: eaas-webhook-processor
  namespace: eaas
  labels:
    app.kubernetes.io/name: eaas-webhook-processor
    app.kubernetes.io/component: webhook-processor
    app.kubernetes.io/part-of: eaas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: eaas-webhook-processor
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
